{% load static %}
<a href="{% url url_name %}" class="group relative flex flex-col items-center gap-2 p-5 bg-zinc-900 border border-white/[0.07] rounded-2xl text-center hover:border-gold/30 hover:-translate-y-1 transition-all duration-300 overflow-hidden">
  {% if soon %}<span class="absolute top-2.5 right-2.5 text-[9px] font-black bg-lbl text-black px-1.5 py-0.5 rounded-full uppercase tracking-wide">Soon</span>{% endif %}
  <div class="w-12 h-12 rounded-full bg-zinc-800 group-hover:bg-gold/10 flex items-center justify-center text-xl text-zinc-400 group-hover:text-gold transition-all">
    <i class="fa-solid {{ icon }}"></i>
  </div>
  <div class="font-bold text-sm text-white">{{ name }}</div>
  <div class="text-[11px] text-zinc-500 leading-tight">{{ desc }}</div>
</a>
